<!DOCTYPE html>

<body>
    <script>
        // The benchmark sends short, uppercase query params (to keep the QR code
        // small); this page maps them to the Google Form's prefill fields and
        // redirects. Which form receives the results depends on the benchmark
        // version (V): different versions use different toolchains, so their
        // results are not comparable and each version submits to its own form.
        // Binaries older than 3.1 send no V and use the original form.
        const forms = {
            "": "https://docs.google.com/forms/d/e/1FAIpQLSdaaUfaAHrlAVNZdLMqxvaUVT-PTu0oWw0n3Qn5ShGb6KzMXA/viewform",
            "3.1": "https://docs.google.com/forms/d/e/1FAIpQLSc38f58AONew6R9Tx1b_b4g4PYVQN0qknOTTxnRUdysJGUEOg/viewform",
        };
        const latest = "3.1";
        const qTime = "entry.405901930";
        const qTrack = "entry.729435593";
        const qConfig = "entry.1527628670";
        const qHostname = "entry.1254205368";
        const qCpu = "entry.1554530656";
        const qMemory = "entry.1830768320";
        const qMisc = "entry.2009930519";
        function getFormUrl(search) {
            const oq = new URLSearchParams(search);
            const version = oq.get('V') || "";
            const baseUrl = forms[version] ?? forms[latest];
            const q = new URLSearchParams({
                [qTime]: oq.get('T') || "",
                [qTrack]: oq.get('K') || "",
                [qConfig]: oq.get('G') || "",
                [qHostname]: oq.get('H') || "",
                [qCpu]: oq.get('C') || "",
                [qMemory]: oq.get('R') || "",
                [qMisc]: oq.get('M') || "",
            });
            const url = new URL(baseUrl);
            url.search = q.toString();
            return url;
        }
        window.addEventListener('load', () => {
            const formUrl = getFormUrl(window.location.search);
            window.location.replace(formUrl);
        });
    </script>
</body>
